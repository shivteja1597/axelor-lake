lake_analytics:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: ':memory:'
      extensions:
        - httpfs
        - iceberg
      settings:
        s3_endpoint: "minio:9000"
        s3_access_key_id: "admin"
        s3_secret_access_key: "password123"
        s3_use_ssl: "false"
        s3_url_style: "path"
        unsafe_enable_version_guessing: "true"
